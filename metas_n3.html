<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Indicadores N3 - Filtro por Mês e Ano</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f2f2f2;
  }

  /* Cabeçalho no padrão BIZA */
  .topo {
    background: #000000;
    padding: 25px;
    text-align: center;
  }

  .topo h1 {
    margin: 0;
    color: #F8AD1E; /* Laranja GHT */
    font-size: 32px;
    font-weight: bold;
  }

  /* Área de filtros */
 .filtros {
    padding: 20px 30px;
    display: flex;
    flex-wrap: wrap;      /* quebra linha no mobile se faltar espaço */
    gap: 10px;            /* espaço entre os elementos */
    align-items: center;  /* alinha tudo na mesma altura */
}

  label {
    font-weight: bold;
    margin-right: 8px;
  }

  select {
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
    margin-right: 15px;
    font-size: 15px;
  }

  button {
    padding: 10px 18px;
    border-radius: 6px;
    border: none;
    background: #F8AD1E;
    color: black;
    font-weight: bold;
    cursor: pointer;
  }

  button:hover {
    background: #e19b16;
  }

  /* Tabela */
/* Container geral centralizado e responsivo */
.container-tabelas {
    width: 100%;
    max-width: 1250px;   /* TAMANHO PADRÃO DE TODAS AS TABELAS */
    margin: 0 auto;      /* Centraliza tudo */
    padding-bottom: 40px;
}

/* Mantém as tabelas alinhadas */
table {
    width: 100% !important;
    border-collapse: collapse;
    background: white;
    border-radius: 10px;
    overflow: hidden;
    margin: 20px auto;
}

/* só a tabela principal começa escondida */
#tabelaResultado {
    display: none;
}

/* Rolagem horizontal no mobile */
@media (max-width: 900px) {
    .container-tabelas {
        padding: 0 10px;
        overflow-x: auto;
    }

    table {
        min-width: 900px; /* Mantém formato mesmo no celular */
    }
}


  th {
    background: #444; 
    color: white;
    font-size: 14px;
    padding: 10px;
    text-align: left;
  }

  td {
    padding: 10px;
    border-bottom: 1px solid #ddd;
  }

  tr:nth-child(even) {
    background: #f9f9f9;
  }

  tr:hover {
    background: #f1f1f1;
  }

  /* Tabela interna dos cards */
.card-table {
    width: 100% !important;
    table-layout: fixed !important;  /* 🔥 PADRONIZA O TAMANHO DAS COLUNAS */
    border-collapse: collapse;
}

/* Padroniza os cabeçalhos das tabelas */
.card-table th {
    width: auto;
    text-align: left;
    background: #000000;
    color: #F9BD45;
    padding: 10px;
    font-size: 14px;
    font-weight: bold;
}

/* Padroniza as células */
.card-table td {
    padding: 10px;
    border-bottom: 1px solid #ddd;
    word-wrap: break-word; /* 🔥 impede quebra feia */
}

/* Centralizar todas as tabelas internas */
.card-wrapper {
    width: 100%;
    max-width: 1250px;   /* 🔥 MESMO PADRÃO PARA TODAS */
    margin: 0 auto;
}
.btn-voltar {
    background: #F8AD1E;
    color: black;
    font-weight: bold;
    padding: 10px 20px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 15px;
    /* tiramos margin-left grande */
}

.btn-voltar:hover {
    background: #e19b16;
}

.btn-toggle-all {
    background: #000;
    color: #F8AD1E;
    font-weight: bold;
    padding: 10px 20px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 15px;
}

.btn-toggle-all:hover {
    background: #222;
}


/* Botão ao lado do título (Painel Gerencial) */
.topo-inner{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:14px;
}

.btn-top-painel{
  background:#f2f2f2;
  color:#555;
  font-weight:bold;
  padding:8px 14px;
  border:1px solid #ccc;
  border-radius:8px;
  cursor:pointer;
  font-size:14px;
}

.btn-top-painel:hover{
  background:#e6e6e6;
}

</style>

</head>
<body>

<div class="topo">
  <div class="topo-inner">
    <h1>Filtro de Indicadores N3</h1>
    <button class="btn-top-painel" onclick="window.location.href='Painel%20Gerencial%20-%20Indicadores%20BIZA.html'">Painel Gerencial</button>
  </div>
</div>

<div class="filtros">
  <label>Mês:</label>
  <select id="filtroMes"></select>

  <label>Ano:</label>
  <select id="filtroAno"></select>

    <!-- botão filtrAR removido <button onclick="filtrar()">Filtrar</button> -->

  <button class="btn-voltar" onclick="window.location.href='index.html'">
    ⬅ Voltar
</button>

<button class="btn-toggle-all" onclick="toggleTodos()">
    Expandir / Recolher Todos
</button>

</div>

<div class="container-tabelas">
    <table id="tabelaResultado">
        <thead id="cabecalho"></thead>
        <tbody id="corpoTabela"></tbody>
    </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<script>
// Caminho do CSV direto do GitHub
const CSV_URL = "https://raw.githubusercontent.com/SGIBIZA/Painel-de-Metas-BIZA/main/base_n3.csv";

// Variáveis globais
let dadosCSV = [];
let cabecalhos = [];

// -----------------------------
// utilidades
// -----------------------------
function normalizar(txt) {
  return (txt || "")
    .toString()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/[^a-zA-Z0-9 ]/g, "")
    .toLowerCase()
    .trim();
}

function normalizarCabecalho(c) {
  return (c || "")
    .toString()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/[^a-zA-Z0-9 ]/g, "")
    .trim();
}

// -----------------------------
// bootstrap
// -----------------------------
document.addEventListener("DOMContentLoaded", () => {
  carregarCSV();

  const filtroMes = document.getElementById("filtroMes");
  const filtroAno = document.getElementById("filtroAno");

  function aoMudarFiltro() {
    const mes = filtroMes.value;
    const ano = filtroAno.value;
    if (mes && ano) filtrar();
  }

  filtroMes.addEventListener("change", aoMudarFiltro);
  filtroAno.addEventListener("change", aoMudarFiltro);
});

// -----------------------------
// 1) Carregar CSV com parser real
// -----------------------------
function carregarCSV() {
  Papa.parse(CSV_URL, {
    download: true,
    header: true,
    delimiter: ";",
    skipEmptyLines: true,
    complete: function(results) {
      const headersOriginais = results.meta.fields || [];

      cabecalhos = headersOriginais.map(normalizarCabecalho);

      dadosCSV = (results.data || []).map(row => {
        const item = {};
        headersOriginais.forEach((h, i) => {
          const chaveNorm = cabecalhos[i];
          item[chaveNorm] = (row[h] ?? "").toString();
        });
        return item;
      });

      preencherFiltros();
    },
    error: function(err) {
      console.error("Erro ao carregar CSV:", err);
    }
  });
}

// Mantido por compatibilidade (não usado agora)
function processarCSV() {}

// -----------------------------
// 2) Criar filtros de Mês e Ano
// -----------------------------
function preencherFiltros() {
  const filtroMes = document.getElementById("filtroMes");
  const filtroAno = document.getElementById("filtroAno");

  const meses = new Set();
  const anos = new Set();

  const mesKey = cabecalhos.find(c => normalizar(c).includes("mes texto"));
  const anoKey = cabecalhos.find(c => normalizar(c) === "ano");

  dadosCSV.forEach(item => {
    meses.add(item[mesKey] || "");
    anos.add(item[anoKey] || "");
  });

  filtroMes.innerHTML = "<option value=''>Selecione</option>";
  filtroAno.innerHTML = "<option value=''>Selecione</option>";

  [...meses].filter(Boolean).forEach(m => filtroMes.innerHTML += `<option value="${m}">${m}</option>`);
  [...anos].filter(Boolean).forEach(a => filtroAno.innerHTML += `<option value="${a}">${a}</option>`);

  const hoje = new Date();
  let mesAnterior = hoje.getMonth() - 1;
  let anoAtual = hoje.getFullYear();

  if (mesAnterior < 0) {
    mesAnterior = 11;
    anoAtual -= 1;
  }

  const nomesMeses = [
    "Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho",
    "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"
  ];
  const mesAnteriorTexto = nomesMeses[mesAnterior];

  if ([...filtroMes.options].some(o => o.value === mesAnteriorTexto)) filtroMes.value = mesAnteriorTexto;
  if ([...filtroAno.options].some(o => o.value === String(anoAtual))) filtroAno.value = String(anoAtual);

  if (filtroMes.value && filtroAno.value) filtrar();
}

// -----------------------------
// 3) Status
// -----------------------------
function gerarBadgeStatus(status) {
  const s = (status || "").toString().toLowerCase().trim();

  if (s.includes("atingido") && !s.includes("não") && !s.includes("nao") && !s.includes("ñ")) {
    return `<div style="display:flex; align-items:center; gap:6px;">
              <div style="width:14px; height:14px; background:#00B050; border-radius:50%;"></div>
              <span style="font-weight:bold;">Atingido</span>
            </div>`;
  }

  if (s.includes("não") || s.includes("nao") || s.includes("ñ")) {
    return `<div style="display:flex; align-items:center; gap:6px;">
              <div style="width:14px; height:14px; background:#FF0101; border-radius:50%;"></div>
              <span style="font-weight:bold;">Não Atingido</span>
            </div>`;
  }

  return `<div style="display:flex; align-items:center; gap:6px;">
            <div style="width:14px; height:14px; background:#EEEE00; border-radius:50%;"></div>
            <span style="font-weight:bold;">Indefinido</span>
          </div>`;
}

function corDoStatus(status) {
  const s = (status || "").toString().toLowerCase().trim();

  if (s.includes("atingido") && !s.includes("não") && !s.includes("nao") && !s.includes("ñ")) return "#00B050";
  if (s.includes("não") || s.includes("nao") || s.includes("ñ")) return "#FF0101";
  return "#FFC000";
}

// ==========================================================
//  LISTAS DE INDICADORES COM FORMATAÇÃO CONTROLADA
// ==========================================================
const LISTA_A_PERCENTUAL = [
  "Índice de Garantia procedente BIZA",
  "Refugo​ Interno",
  "Percentual e Valores de Itens sem movimentação de Estoque a mais de um ano​​​",
  "Absenteísmo Mês",
  "Percentual de Turnover Mês​",
  "Percentual de Itens Novos Produzidos no Mês​",
  "Percentual de vendas marca BIZA",
  "Quantidade e percentual de NC's encerradas dentro do prazo",
  "Performance de entregas BIZA (Pedidos entregues no prazo)​",
  "Programação de entrega Mensal​",
  "Acuracidade de Estoque",
  "Performance do Atendimento às Obrigações Legais Mês",
  "GGF Salarial - Relatório Entradas de NF"
].map(normalizar);

const LISTA_B_FINANCEIRO = [
  "Valor de Produção Mensal",
  "Valores de venda Marca BIZA",
  "Valor de Produção Acumulado",
  "Valor total de itens terceirização por mês",
  "Valor total de itens industrializados por mês​",
  "Valor em estoque BIZA estratificado",
  "Vendas Marca Biza (Últimos 3 anos)",
  "Valores de Pedidos em Carteira"
].map(normalizar);

const LISTA_C_META_PERCENTUAL = [
  "Índice de Garantia procedente BIZA",
  "Refugo​ Interno",
  "Percentual e Valores de Itens sem movimentação de Estoque a mais de um ano​​​",
  "Absenteísmo Mês",
  "Percentual de Turnover Mês​",
  "Percentual de Itens Novos Produzidos no Mês​",
  "Percentual de vendas marca BIZA",
  "Quantidade e percentual de NC's encerradas dentro do prazo",
  "Performance de entregas BIZA (Pedidos entregues no prazo)​",
  "Programação de entrega Mensal​",
  "Acuracidade de Estoque",
  "Performance do Atendimento às Obrigações Legais Mês",
  "GGF Salarial - Relatório Entradas de NF"
].map(normalizar);

// ==========================================================
//  FORMATADORES
// ==========================================================
function formatarPercentual(valor) {
  if (!valor) return valor;
  if (String(valor).includes("%")) return valor;

  let num = parseFloat(String(valor).replace(",", "."));
  if (isNaN(num)) return valor;

  if (num <= 3) num = num * 100;
  return num.toFixed(2).replace(".", ",") + "%";
}

function formatarFinanceiro(valor) {
  if (!valor) return valor;
  let num = parseFloat(String(valor).replace(",", "."));
  if (isNaN(num)) return valor;

  if (num >= 1_000_000) return (num / 1_000_000).toFixed(2).replace(".", ",") + " mi";
  if (num >= 1000) return (num / 1000).toFixed(2).replace(".", ",") + " mil";

  return num.toString().replace(".", ",");
}

function formatarValor(indicador, coluna, valor) {
  if (valor === null || valor === undefined || valor === "") return valor;
  if (!indicador) return valor;

  const indNorm = normalizar(indicador);
  const colNorm = (coluna || "").toString().trim();

  if (LISTA_A_PERCENTUAL.includes(indNorm) && colNorm === "Resultado") return formatarPercentual(valor);
  if (LISTA_A_PERCENTUAL.includes(indNorm) && colNorm === "Meta") return formatarPercentual(valor);

  if (LISTA_B_FINANCEIRO.includes(indNorm) && (colNorm === "Meta" || colNorm === "Resultado")) {
    return formatarFinanceiro(valor);
  }

  if (LISTA_C_META_PERCENTUAL.includes(indNorm) && colNorm === "Meta") return formatarPercentual(valor);

  let num = parseFloat(String(valor).replace(",", "."));
  if (!isNaN(num)) return Math.round(num).toString();

  return valor;
}

// -----------------------------
// 4) Filtrar e montar a tabela
// -----------------------------
function filtrar() {
  const mes = document.getElementById("filtroMes").value;
  const ano = document.getElementById("filtroAno").value;

  const indicadorKey = cabecalhos.find(c => normalizar(c).includes("indicador"));
  const mesKey = cabecalhos.find(c => normalizar(c).includes("mes texto"));
  const anoKey = cabecalhos.find(c => normalizar(c) === "ano");
  const areaKey = cabecalhos.find(c => normalizar(c).startsWith("area"));
  const respKey = cabecalhos.find(c => normalizar(c).startsWith("respons"));
  const statusKey = cabecalhos.find(c => normalizar(c).includes("status"));

  // detecta variações de nome
  const comentariosKey = cabecalhos.find(c => normalizar(c).includes("coment"));
  const acoesKey = cabecalhos.find(c => {
    const n = normalizar(c);
    return n.includes("acao") || n.includes("acoes");
  });

  if (!mes || !ano) {
    alert("Selecione Mês e Ano para filtrar.");
    return;
  }

  const tabela = document.getElementById("tabelaResultado");
  const cabeca = document.getElementById("cabecalho");
  const corpo  = document.getElementById("corpoTabela");

  const filtrados = dadosCSV.filter(item =>
    (item[mesKey] || "") === mes && (item[anoKey] || "") === ano
  );

  cabeca.innerHTML = "";
  corpo.innerHTML  = "";

  // colunas fixas virtuais para garantir posição
  const COL_COMENT = "__COMENTARIOS__";
  const COL_ACOES  = "__ACOES__";

_COMENT, COL_ACOES);
  } else {
    colunasCard.push(COL_COMENT, COL_ACOES);
  }

  // agrupamento por card
  const grupos = {};
  filtrados.forEach(item => {
    const chave = `${item[areaKey] || "-"} – ${item[respKey] || "-"}`;
    if (!grupos[chave]) grupos[chave] = [];
    grupos[chave].push(item);
  });

  Object.keys(grupos).forEach(grupoNome => {
    const linhaGrupo = document.createElement("tr");
    linhaGrupo.innerHTML = `
      <td colspan="${colunasCard.length}"
          style="background:#333; color:#FFFFFF; cursor:pointer; padding:12px; font-size:20px; font-weight:bold;">
        ▼ ${grupoNome}
      </td>
    `;
    corpo.appendChild(linhaGrupo);

    const tabelaCard = document.createElement("table");
    tabelaCard.classList.add("card-table");
    tabelaCard.style.width = "100%";
    tabelaCard.style.marginBottom = "25px";
    tabelaCard.style.display = "none";

    const thead = document.createElement("thead");
    const tbody = document.createElement("tbody");

    const headerRow = document.createElement("tr");
    headerRow.innerHTML = colunasCard.map(c => {
      if (c === COL_COMENT) return "<th>Comentários</th>";
      if (c === COL_ACOES) return "<th>Ações</th>";
      return `<th>${c}</th>`;
    }).join("");
    thead.appendChild(headerRow);

    grupos[grupoNome].forEach(item => {
      const linha = document.createElement("tr");

      linha.innerHTML = colunasCard.map(c => {
        if (c === COL_COMENT) {
          const valor = comentariosKey ? (item[comentariosKey] ?? "") : "";
          return `<td style="white-space: pre-line;">${valor}</td>`;
        }

        if (c === COL_ACOES) {
          const valor = acoesKey ? (item[acoesKey] ?? "") : "";
          return `<td style="white-space: pre-line;">${valor}</td>`;
        }

        const valor = item[c] ?? "";

        if (normalizar(c).includes("status")) {
          return `<td>${gerarBadgeStatus(valor)}</td>`;
        }

        if (normalizar(c).includes("resultado")) {
          const cor = corDoStatus(item[statusKey] || "");
          return `<td style="background:${cor}; color:white; font-weight:bold; text-align:center; border-radius:4px;">
                    ${formatarValor(item[indicadorKey], "Resultado", valor)}
                  </td>`;
        }

        return `<td>${formatarValor(item[indicadorKey], c, valor)}</td>`;
      }).join("");

      tbody.appendChild(linha);
    });

    tabelaCard.appendChild(thead);
    tabelaCard.appendChild(tbody);

    const linhaTabela = document.createElement("tr");
    const tdTabela = document.createElement("td");
    tdTabela.colSpan = colunasCard.length;
    tdTabela.appendChild(tabelaCard);
    linhaTabela.appendChild(tdTabela);
    corpo.appendChild(linhaTabela);

    linhaGrupo.addEventListener("click", () => {
      tabelaCard.style.display = tabelaCard.style.display === "none" ? "" : "none";
    });
  });

  tabela.style.display = "table";
}

function toggleTodos() {
  const todasTabelas = document.querySelectorAll(".card-table");
  let temAlgumaAberta = false;

  todasTabelas.forEach(t => {
    if (t.style.display !== "none") temAlgumaAberta = true;
  });

  todasTabelas.forEach(t => {
    t.style.display = temAlgumaAberta ? "none" : "";
  });
}
</script>
</body>
</html>
